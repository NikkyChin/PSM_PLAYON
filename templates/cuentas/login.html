<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ingreso - PSM Playón</title>
</head>
<body>
    <h1>Ingreso al sistema del Playón Municipal</h1>

    {% if form.errors %}
        <p style="color: red;">Usuario o contraseña incorrectos.</p>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <div>
            <label for="id_username">Usuario:</label>
            {{ form.username }}
        </div>
        <div>
            <label for="id_password">Contraseña:</label>
            {{ form.password }}
        </div>
        <button type="submit">Entrar</button>
    </form>
</body>
</html>
