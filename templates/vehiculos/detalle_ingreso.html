<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Detalle del ingreso {{ ingreso.nro_legajo_playon }}</title>
</head>
<body>
  <h1>Detalle del ingreso {{ ingreso.nro_legajo_playon }}</h1>

  {% include "vehiculos/_ingreso_detalle_bloque.html" with ingreso=ingreso %}

  {% if not ingreso.retirado %}
    <p>
      <a href="{% url 'registrar_egreso' ingreso.id %}">Registrar retiro ahora</a>
    </p>
  {% endif %}

  <hr>
  <p>
    <a href="{% url 'lista_ingresos' %}">Volver a la lista de ingresos</a> |
    <a href="{% url 'home' %}">Volver al menú principal</a>
  </p>
</body>
</html>
