services:
  db:
    image: postgres:15-alpine
    container_name: psm_playon_db
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    image: nicoudc/psm-playon:v1.2
    container_name: psm_playon_web
    restart: unless-stopped
    command: sh /code/entrypoint.sh
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - django_media:/code/media
      - /home/dev-2/Escritorio/trabajo/PSM_PLAYON/staticfiles:/code/staticfiles  

  nginx:
    image: nginx:alpine
    container_name: psm_playon_nginx
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - django_media:/code/media
      - /home/dev-2/Escritorio/trabajo/PSM_PLAYON/staticfiles:/code/staticfiles  

volumes:
  postgres_data:
  django_media:
  django_static:  
